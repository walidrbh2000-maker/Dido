name: voyageur
description: Application de voyage connectée à une API Laravel REST
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  riverpod_annotation: any

  go_router: any

  dio: ^5.0.0
  retrofit: ^4.1.0

  freezed_annotation: ^2.4.1
  json_annotation: any

  flutter_secure_storage: any
  shared_preferences: any

  shimmer: any
  lottie: any
  cached_network_image: any
  flutter_svg: any
  animations: any
  flutter_animate: any
  smooth_page_indicator: any

  form_validator: any

  intl: any

  logger: any
  equatable: any
  dartz: any
  uuid: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  build_runner: ^2.4.0
  freezed: ^2.4.1
  json_serializable: ^6.7.1
  riverpod_generator: any
  custom_lint: any
  riverpod_lint: any

flutter:
  generate: true
  uses-material-design: true

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
